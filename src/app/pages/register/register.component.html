<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Prompt:wght@300;400;500;700&family=Mitr:wght@300;400;500;700&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
     
    </style>
</head>

<body>
    <header>
        <nav>
            <div>
                <button class="back-btn" (click)="back()">กลับ</button>
            </div>
            <div class="logo">
                <h1>RevMSU</h1>
            </div>
        </nav>
    </header>
    <main>
        <div class="content">
            <div class="card">
                <div class="title">
                    <h2>สมัครสมาชิก</h2>
                </div>
                
                <div class="name-border">
                    <input type="text" placeholder="ชื่อ" [(ngModel)]="name">
                </div>

                <div class="email-border">
                    <input type="email" placeholder="อีเมล" [(ngModel)]="email">
                </div>
                
                <div class="password-border">
                    <input type="password" placeholder="รหัสผ่าน" [(ngModel)]="password">
                </div>

                <div class="confirm-password-border">
                    <input type="password" placeholder="ยืนยันรหัสผ่าน" [(ngModel)]="confirmPassword">
                </div>

                <div class="recaptcha-container">
                    <div id="recaptcha-container"></div>
                </div>

                <button class="register-btn" (click)="register()">สมัครสมาชิก</button>

                <div class="divider">
                    <span>หรือ</span>
                </div>

                <button class="register-with-google" (click)="googleRegister()">
                    สมัครด้วย 
                    <img src="/assets/images/google.png" alt="Google logo">
                </button>

                <!-- <div class="have-account">
                    <span>มีบัญชีอยู่แล้ว? <a href="/login">เข้าสู่ระบบ</a></span>
                </div> -->
            </div>
        </div>
    </main>
</body>

</html>
