<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>

</head>

<body>
    <div class="page-wrapper">
        <header>
            <button class="back-btn" (click)="back()">กลับ</button>
            <div class="divider"></div>
            <h1 class="page-title">แก้ไขโปรไฟล์</h1>
        </header>

        <main class="profile-container">

            <aside class="profile-sidebar">

                <div class="profile-img-box" (click)="fileInput.click()">

                    <img [src]="previewImage || profileUrl" alt="Profile Image" class="profile-img">

                    <div class="img-overlay">
                        <svg class="camera-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                            <path d="M0 0h24v24H0z" fill="none" />
                        </svg>
                        <span>เปลี่ยนรูป</span>
                    </div>

                </div>

                <div class="form-container">
                    <div class="form-group">
                        <label class="form-label">ชื่อผู้ใช้งาน</label>
                        <input type="text" class="form-input" [(ngModel)]="name" placeholder="กรอกชื่อของคุณ">
                    </div>

                    <div class="form-group">
                        <label class="form-label">อีเมล</label>
                        <input type="email" class="form-input" [(ngModel)]="email" placeholder="name@example.com"
                            readonly>
                    </div>

                    <div class="form-group">
                        <label class="form-label">รหัสผ่านเดิม</label>
                        <div class="password-input-wrapper">
                            <input [type]="showOldPassword ? 'text' : 'password'" class="form-input"
                                [(ngModel)]="oldPassword"
                                placeholder="กรอกรหัสผ่านเดิม (เว้นว่างไว้ถ้าไม่ต้องการเปลี่ยน)">
                            <button type="button" class="toggle-password" (click)="showOldPassword = !showOldPassword">
                                <svg *ngIf="!showOldPassword" viewBox="0 0 24 24">
                                    <path
                                        d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                                </svg>
                                <svg *ngIf="showOldPassword" viewBox="0 0 24 24">
                                    <path
                                        d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">รหัสผ่านใหม่</label>
                        <div class="password-input-wrapper">
                            <input [type]="showNewPassword ? 'text' : 'password'" class="form-input"
                                [(ngModel)]="newPassword" placeholder="กรอกรหัสผ่านใหม่">
                            <button type="button" class="toggle-password" (click)="showNewPassword = !showNewPassword">
                                <svg *ngIf="!showNewPassword" viewBox="0 0 24 24">
                                    <path
                                        d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                                </svg>
                                <svg *ngIf="showNewPassword" viewBox="0 0 24 24">
                                    <path
                                        d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">ยืนยันรหัสผ่านใหม่</label>
                        <div class="password-input-wrapper">
                            <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-input"
                                [(ngModel)]="confirmPassword" placeholder="ยืนยันรหัสผ่านใหม่">
                            <button type="button" class="toggle-password"
                                (click)="showConfirmPassword = !showConfirmPassword">
                                <svg *ngIf="!showConfirmPassword" viewBox="0 0 24 24">
                                    <path
                                        d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                                </svg>
                                <svg *ngIf="showConfirmPassword" viewBox="0 0 24 24">
                                    <path
                                        d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <input #fileInput type="file" class="hidden-file-input" accept="image/*" (change)="onFileSelected($event)">

                <button class="save-btn" (click)="updateUser()">บันทึกการแก้ไข</button>
            </aside>

            <section class="profile-content">

                <div class="tabs-header">
                    <button class="tab-btn" [class.active]="currentTab === 'reviews'" (click)="tab('reviews')">
                        โพสต์รีวิวของฉัน
                    </button>

                    <button class="tab-btn" [class.active]="currentTab === 'questions'" (click)="tab('questions')">
                        โพสต์คำถามของฉัน
                    </button>
                </div>

                <div class="tab-pane active" *ngIf="currentTab === 'reviews'">
                    <div class="list-item" *ngFor="let item of myReviews" (click)="linkToDetails(item.pid)">
                        <span class="item-code">{{ item.subcode }}</span>
                        <span class="item-date">{{ item.date | date:'yyyy-MM-dd' }}</span>
                    </div>
                    <div *ngIf="myReviews.length === 0" class="empty-state">
                        คุณยังไม่มีประวัติการรีวิว
                    </div>
                </div>

                <div class="tab-pane active" *ngIf="currentTab === 'questions'">
                    <div class="list-item" *ngFor="let item of myQuestions" (click)="linkToQuestionDetail(item.id)">
                        <span class="item-code">โพสต์ตั้งคำถามเมื่อ {{ item.date| date:'yyyy-MM-dd' }}</span>

                    </div>
                    <div *ngIf="myQuestions.length === 0" class="empty-state">
                        คุณยังไม่มีประวัติการตั้งคำถาม
                    </div>
                </div>

            </section>
        </main>
    </div>
</body>

</html>
