<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Prompt:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Review</title>
    <style>
       
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header>
            <nav>
                <button class="back-btn" onclick="history.back()">กลับ</button>
            </nav>
        </header>

        <main>
            <div class="content">
                <h1 class="title">แก้ไขรีวิวของคุณ</h1>

                <div id="course-info-container" *ngFor="let subject of subjectData">
                    <div class="course-code">{{ subject.subcode }}</div>
                    <div class="course-name">{{ subject.name }}</div>
                </div>

                <p class="rating-label">เลือกจำนวนดาวเพื่อบอกความพอใจของคุณ</p>

                <div class="rating-group">
                    <input type="radio" name="rating" id="rate-1" value="1" [checked]="rate == 1" (change)="rate = 1">
                    <label for="rate-1">1★</label>

                    <input type="radio" name="rating" id="rate-2" value="2" [checked]="rate == 2" (change)="rate = 2">
                    <label for="rate-2">2★</label>

                    <input type="radio" name="rating" id="rate-3" value="3" [checked]="rate == 3" (change)="rate = 3">
                    <label for="rate-3">3★</label>

                    <input type="radio" name="rating" id="rate-4" value="4" [checked]="rate == 4" (change)="rate = 4">
                    <label for="rate-4">4★</label>

                    <input type="radio" name="rating" id="rate-5" value="5" [checked]="rate == 5" (change)="rate = 5">
                    <label for="rate-5">5★</label>
                </div>

                <textarea class="review-box" placeholder="พิมพ์ข้อความรีวิวที่นี่ (จำกัด 45 ตัวอักษร)"
                    [(ngModel)]="reviewText"></textarea>

                <div class="action-bar">
                    <button class="post-btn" (click)="confirmEdit()">แก้ไขรีวิว</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. Mock Data จำลอง API
        const mockApiData = {
            data: {
                subject_id: "0041001",
                subject_name_th: "ภาษาอังกฤษเพื่อเตรียมความพร้อม"
            }
        };

        // 2. ดึงข้อมูลมาแสดงเมื่อโหลดหน้าเว็บ
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const subject = mockApiData.data;
                document.getElementById('courseCode').textContent = subject.subject_id;
                document.getElementById('courseName').textContent = subject.subject_name_th;
            }, 300);
        });

        // 3. ฟังก์ชันจำลองการกดโพสต์ (ดึงค่าจาก Radio ที่เลือก)
        function submitReview() {
            // หา radio ที่ถูก check อยู่
            const selectedRating = document.querySelector('input[name="rating"]:checked');

            if (selectedRating) {
                alert('คุณให้คะแนน: ' + selectedRating.value + ' ดาว');
            } else {
                alert('กรุณาเลือกจำนวนดาวก่อนโพสต์');
            }
        }
    </script>
</body>

</html>
