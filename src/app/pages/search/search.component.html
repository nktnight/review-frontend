<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Prompt:wght@300;400;500;700&family=Mitr:wght@300;400;500;700&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Result</title>
    <style>
       
    </style>
</head>

<body>
    <div class="container-wrapper">
        <header>
            <nav>
                <div>
                    <button class="back-btn" (click)="back()">กลับ</button>
                </div>
                <div class="logo">
                    <h1>RevMSU</h1>
                </div>
            </nav>
        </header>
        <main>
            <div class="content">
                <div class="search-result">
                    <span>ผลการค้นหารหัสวิชา : {{subcode}}</span>
                </div>

                <ng-container *ngIf="!notFound && subject.length > 0; else noResultTemplate">
                    <div class="subject-card" *ngFor="let item of subject" (click)="linkToSubject(item.subid)">
                        <div class="subject-code">
                            <span>{{item.subcode}}</span>
                        </div>
                        <div class="subject-name-rate-review">
                            <div class="halft">
                                <span>{{item.name}}</span>
                            </div>
                            <div class="halfb">
                                <div class="halfl">
                                    <span>รีวิวทั้งหมด {{item.review_count}}</span>
                                </div>
                                <div class="halfr">
                                    <span>คะแนนรีวิว {{item.avg_rate}}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </ng-container>

                <ng-template #noResultTemplate>
                    <div class="no-result">
                        <span>ไม่พบรายวิชาที่ค้นหา</span>
                    </div>
                </ng-template>

            </div>
        </main>
        <footer>

        </footer>
    </div>
</body>

</html>
