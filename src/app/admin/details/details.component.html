<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Details</title>
</head>
<body>

    <div class="container">
        <header class="header">
            <button class="back-btn" (click)="back()">กลับ</button>
            <span class="title">Subject Details</span>
        </header>

        <div class="select-text">เลือกวิชาที่ต้องการแก้ไข</div>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="กรอกรหัส หรือ ชื่อรายวิชา..." [(ngModel)]="searchTerm">
            <button class="search-button" (click)="getSubjectsBySearch(searchTerm)">ค้นหา</button>
        </div>

        <main class="subject-list">
            <div class="subject-card" *ngFor="let subject of subjectsList" (click)="details(subject.subid)">
                <div class="subject-info">
                    <span class="subject-code">{{ subject.subcode }}</span>
                    <span class="subject-name">{{ subject.name }}</span>
                </div>
                <i class="fas fa-chevron-right action-icon"></i>
            </div>
            
        </main>
    </div>

</body>
</html>
