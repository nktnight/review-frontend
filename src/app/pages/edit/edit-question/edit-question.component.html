<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Question</title>
</head>

<body>
    <div class="page-wrapper">
        <header>
            <nav>
                <button class="back-btn" onclick="history.back()">กลับ</button>
            </nav>
        </header>

        <main>
            <div class="content">
                <h1 class="title">แก้ไขกระทู้ถามของคุณ</h1>
                
                <textarea class="question-box" placeholder="แก้ไขรายละเอียดคำถามของคุณที่นี่ (จำกัด 45 ตัวอักษร)" [(ngModel)]="questionText"></textarea>

                <div class="action-bar">
                    <button class="post-btn" (click)="editQuestion()">บันทึกการแก้ไข</button>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
